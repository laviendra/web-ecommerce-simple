<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="login.js"></script>
    <style>
        /* Modern Styling */
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f9f6f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-container {
            background-color: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-container img {
            width: 100px;
            height: auto;
            margin-bottom: 1rem;
        }

        .login-container h1 {
            font-size: 2rem;
            color: #6c5ce7;
            margin-bottom: 1rem;
        }

        .login-container input {
            width: 93%;
            padding: 0.8rem;
            margin-bottom: 1.2rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            color: #333;
        }

        .login-container button {
            width: 100%;
            padding: 0.8rem;
            background-color: #6c5ce7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .login-container button:hover {
            background-color: #5a47c1;
        }
    </style>
</head>
<body>
    <!-- Konten Utama -->
    <div class="login-container">
        <img src="logo.png" alt="Logo Toko Radts">
        <h1>Login Toko Radts</h1>
        <form id="login-form">
            <input type="text" id="username" placeholder="Nama Pengguna" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Masuk</button>
        </form>
    </div>

    <script>
        // Ambil elemen form dan input
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        // Simulasi login
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Validasi apakah kedua input sudah diisi
            if (username && password) {
                alert(`Login berhasil!\nSelamat datang, ${username}.`);
                // Arahkan ke halaman utama setelah login berhasil
                window.location.href = "index.html";
            } else {
                alert("Harap isi Nama Pengguna dan Password.");
            }
        });
    </script>
</body>
</html>
